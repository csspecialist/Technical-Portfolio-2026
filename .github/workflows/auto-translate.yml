name: AI-Powered Localization (Gemini)

on:
  push:
    paths:
      - 'src/content/docs/en/**'
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Gemini Translation (International French)
        uses: marketplace/actions/gemini-i18n-translator@v1 # Verified Gemini action
        with:
          api_key: ${{ secrets.GEMINI_API_KEY }}
          source_lang: 'English'
          target_lang: 'French'
          input_path: 'src/content/docs/en'
          output_path: 'src/content/docs/fr'
          # We pass your custom rules here
          custom_prompt: "Preserve all Astro frontmatter and ::: components. Use standard International French."

      - name: Gemini Translation (Quebec French)
        uses: marketplace/actions/gemini-i18n-translator@v1
        with:
          api_key: ${{ secrets.GEMINI_API_KEY }}
          source_lang: 'English'
          target_lang: 'French (Canada)'
          input_path: 'src/content/docs/en'
          output_path: 'src/content/docs/fr-ca'
          custom_prompt: "Preserve all Astro frontmatter and ::: components. Use Quebec Professional French (e.g., 'courriel' instead of 'email')."

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "bot: Gemini-powered localization update" || echo "No changes to commit"
          git push