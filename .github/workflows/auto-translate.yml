name: AI-Powered Localization (Gemini)

on:
  push:
    paths:
      - 'src/content/docs/en/**'
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Google Generative AI Library
        run: pip install -q -U google-generativeai

      - name: Run Translation Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<EOF
          import os
          import google.generativeai as genai
          import glob

          genai.configure(api_key=os.environ['GEMINI_API_KEY'])
          model = genai.GenerativeModel('gemini-1.5-flash')

          # The list of target folders you want to populate
          targets = ['fr', 'fr-ca']

          for target in targets:
              # Find all English mdx files
              files = glob.glob('src/content/docs/en/**/*.mdx', recursive=True)
              
              for file_path in files:
                  # Create the target path (e.g., replace /en/ with /fr/)
                  target_path = file_path.replace('/en/', f'/{target}/')
                  os.makedirs(os.path.dirname(target_path), exist_ok=True)

                  with open(file_path, 'r') as f:
                      content = f.read()

                  # Your Architect Prompt
                  dialect = "Quebec Professional French (using 'courriel')" if target == 'fr-ca' else "Standard International French"
                  prompt = f"Translate the following Markdown to {dialect}. Preserve all Frontmatter (text between ---) and Starlight components (:::). Keep code blocks in English:\n\n{content}"
                  
                  response = model.generate_content(prompt)
                  
                  with open(target_path, 'w') as f:
                      f.write(response.text)
                  print(f"Localized: {target_path}")
          EOF

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "bot: AI-powered localization update" || echo "No changes to commit"
          git push